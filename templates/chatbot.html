<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="chat-container">
    <header>
        <h1>Luxco<span>Y1</span></h1>
        <a href="/">Home</a>
    </header>
    <div id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function formatLinks(rawText) {
    if (!rawText) return "";
    const lines = rawText.split("\n").map(line => line.trim()).filter(Boolean);
    const urls = lines.filter(line => line.startsWith("http://") || line.startsWith("https://"));
    if (!urls.length) return rawText;
    return urls.map(url => `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`).join("<br>");
}

async function sendMessage() {
    let inputField = document.getElementById("user-input");
    let message = inputField.value;
    if (message.trim() === "") return;
    let chatBox = document.getElementById("chat-box");
    chatBox.innerHTML += `<div class='user-msg'>${message}</div>`;
    // Add typing animation only (no structure yet)
    let botDiv = document.createElement('div');
    botDiv.className = 'bot-msg-stream';
    botDiv.id = 'streaming-bot-msg';
    let typingSpan = document.createElement('span');
    typingSpan.id = 'typing-animation';
    typingSpan.textContent = 'typing.';
    botDiv.appendChild(typingSpan);
    chatBox.appendChild(botDiv);
    chatBox.scrollTop = chatBox.scrollHeight;

    // Animate typing...
    let dots = 0;
    let typingInterval = setInterval(() => {
        dots = (dots + 1) % 4;
        let typing = document.getElementById('typing-animation');
        if (typing) {
            typing.textContent = 'typing' + '.'.repeat(dots);
        }
    }, 400);

    // Get structured response from backend (no stream_api.py)
    let response = await fetch('/get', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: message })
    });
    let payload = await response.json();
    clearInterval(typingInterval);
    // Remove typing animation and show the full structure
    botDiv.innerHTML = '<b>Explanation:</b><br><span id="explain-stream"></span><br><br>' +
                       '<b>Summary:</b><br><span id="summary-stream"></span><br><br>' +
                       '<b>Examples:</b><br><span id="example-stream"></span><br><br>' +
                       '<b>Links:</b><br><span id="links-stream"></span>';
    let explainSpan = document.getElementById('explain-stream');
    let summarySpan = document.getElementById('summary-stream');
    let exampleSpan = document.getElementById('example-stream');
    let linksSpan = document.getElementById('links-stream');

    const data = payload.reply || {};
    explainSpan.textContent = data.explain || "No explanation returned.";
    summarySpan.textContent = data.summary || "No summary returned.";
    exampleSpan.textContent = data.example || "No examples returned.";
    linksSpan.innerHTML = formatLinks(data.links || "No links returned.");
    inputField.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>
</body>
</html>
