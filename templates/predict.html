<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crop Medicine Prediction</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0b1020;
    color:white;
}

.container{
    width:90%;
    margin:auto;
    text-align:center;
}

header{
    padding:20px;
    background:#111a30;
    display:flex;
    justify-content:space-between;
}

h1 span{color:#00d4ff}

.section{
    padding:60px 0;
}

input, button{
    padding:12px;
    margin:10px;
    border:none;
    border-radius:5px;
}

input{
    width:250px;
}

button{
    background:#00d4ff;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#00aacc;
}

.result{
    margin-top:20px;
    background:#111a30;
    padding:20px;
    border-radius:10px;
}

img{
    margin-top:20px;
    max-width:300px;
}

</style>
</head>

<body>

<header>
    <h1>Crop <span>Prediction</span></h1>
    <a href="index.html" style="color:white">Home</a>
</header>

<div class="container">

<section class="section">
    <h2>Upload Crop Image</h2>
    <p>Select a crop image to predict disease and medicine.</p>

    <input type="file" id="imageInput">
    <br>
    <button onclick="predict()">Predict</button>

    <div>
        <img id="preview" src="" alt="">
    </div>

    <div class="result" id="resultBox" style="display:none;">
        <h3>Prediction Result</h3>
        <p id="predictionText"></p>
    </div>
</section>

</div>

<script>
function predict(){
    let fileInput = document.getElementById("imageInput");
    let file = fileInput.files[0];

    if(!file){
        alert("Please upload an image");
        return;
    }

    // Preview image
    let reader = new FileReader();
    reader.onload = function(e){
        document.getElementById("preview").src = e.target.result;
    }
    reader.readAsDataURL(file);

    let formData = new FormData();
    formData.append("file", file);

    fetch("/predict", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("resultBox").style.display = "block";
        document.getElementById("predictionText").innerText = data.result;
    })
    .catch(err => {
        console.log(err);
    });
}
</script>

</body>
</html>
