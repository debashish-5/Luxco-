<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crop Medicine Prediction</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        margin: 0;
        padding: 0;
    }

    .chat-container {
        width: 90%;
        max-width: 700px;
        margin: 50px auto;
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0px 0px 12px rgba(0,0,0,0.12);
    }

    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 15px;
        border-bottom: 1px solid #ddd;
        margin-bottom: 20px;
    }

    header h1 {
        margin: 0;
        font-size: 28px;
        color: #222;
    }

    header h1 span {
        color: #28a745;
    }

    header a {
        text-decoration: none;
        color: white;
        background: #007bff;
        padding: 10px 16px;
        border-radius: 8px;
    }

    .section {
        padding: 10px 0;
    }

    h2 {
        margin-top: 0;
        color: #222;
    }

    p {
        color: #555;
    }

    .upload-area {
        margin: 20px 0;
    }

    input, button {
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        margin: 8px 0;
        box-sizing: border-box;
        font-size: 15px;
    }

    input[type="file"] {
        width: 100%;
        background: #fafafa;
    }

    input[type="text"] {
        width: 100%;
    }

    button {
        background: #28a745;
        color: white;
        border: none;
        cursor: pointer;
        width: 100%;
        font-weight: bold;
        transition: 0.3s;
    }

    button:hover {
        background: #218838;
    }

    .preview-box {
        margin-top: 15px;
        text-align: center;
    }

    img {
        max-width: 250px;
        width: 100%;
        border-radius: 10px;
        display: none;
        margin-top: 10px;
        border: 1px solid #ddd;
    }

    .result {
        margin-top: 20px;
        background: #e5e5ea;
        padding: 15px;
        border-radius: 8px;
        display: none;
        line-height: 1.5;
    }

    .medicine-form {
        margin-top: 25px;
        padding-top: 15px;
        border-top: 1px solid #ddd;
    }
    .notice-success {
        background-color: honeydew;

    }
</style>
</head>

<body>

<div class="chat-container">
    <header>
        <h1>Luxco <span>Y2</span></h1>
        <a href="/">Home</a>
    </header>

    <div class="section">
        <h2>Upload Crop Image</h2>
        <p>Select a crop image to predict disease and medicine.</p>

        <div class="upload-area">
            <input type="file" id="imageInput" accept="image/*">
            <button type="button" onclick="predict()">Predict</button>
        </div>

        <div class="preview-box">
            <img id="preview" src="" alt="Preview Image">
        </div>

        <div class="result" id="resultBox">
            <h3>Prediction Result</h3>
            <p id="predictionText"></p>
        </div>

        <form method="post" class="medicine-form">
            <input type="text" name="crop" placeholder="Crop name" value="{{ crop or '' }}" required>
            <input type="text" name="problem" placeholder="Problem or disease" value="{{ problem or '' }}" required>
            <input type="text" name="weather" placeholder="Weather" value="{{ weather or '' }}">
            <input type="text" name="soil" placeholder="Soil type" value="{{ soil or '' }}">
            <input type="text" name="stage" placeholder="Growth stage" value="{{ stage or '' }}">
            <input type="text" name="severity" placeholder="Severity" value="{{ severity or '' }}">
            <button type="submit">Predict Medicine</button>
        </form>
        
{% if prediction %}
  <div class="notice-success">
    <strong>Prediction:</strong> {{ prediction }}
    <br>
    <strong>Suggestion:</strong> {{suggestion}}
  </div>
{% endif %}
    </div>
</div>

<script>
function predict() {
    let fileInput = document.getElementById("imageInput");
    let file = fileInput.files[0];

    if (!file) {
        alert("Please upload an image");
        return;
    }

    let reader = new FileReader();
    reader.onload = function(e) {
        let preview = document.getElementById("preview");
        preview.src = e.target.result;
        preview.style.display = "block";
    };
    reader.readAsDataURL(file);

    let formData = new FormData();
    formData.append("file", file);

    fetch("/predict", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("resultBox").style.display = "block";
        document.getElementById("predictionText").innerText = data.result;
    })
    .catch(err => {
        console.log(err);
        alert("Prediction failed");
    });
}
</script>

</body>
</html>
